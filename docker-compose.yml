networks:
  marketing-net:
    driver: bridge

services:
  # 1. Database
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: mkt_clickhouse
    environment:
      - CLICKHOUSE_DB=marketing_db
      - CLICKHOUSE_USER=admin
      - CLICKHOUSE_PASSWORD=password123
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - marketing-net

  # 2. Apache Kafka (KRaft Mode)
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: mkt_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qo'
      
    networks:
      - marketing-net

  # 3. MinIO
  minio:
    image: minio/minio:latest
    container_name: mkt_minio
    ports:
      - "9005:9000" 
      - "9006:9001" 
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - marketing-net

  minio-init:
    image: minio/mc:latest
    container_name: mkt_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc config host add myminio http://minio:9000 admin password123) do echo 'Waiting for MinIO...' && sleep 1; done;
      /usr/bin/mc mb myminio/marketing-datalake;
      /usr/bin/mc policy set public myminio/marketing-datalake;
      exit 0;
      "
    networks:
      - marketing-net

  superset:
    build: 
      context: .
      dockerfile: Dockerfile.superset
    container_name: mkt_superset
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY=marketing_big_data_key_2026
      - ADMIN_USERNAME=admin
      - ADMIN_EMAIL=admin@fab.org
      - ADMIN_PASSWORD=password123
    depends_on:
      - clickhouse
      - kafka
      - minio
    networks:
      - marketing-net
    entrypoint: >
      /bin/sh -c "
      superset fab create-admin --username $$ADMIN_USERNAME --firstname Superset --lastname Admin --email $$ADMIN_EMAIL --password $$ADMIN_PASSWORD || true &&
      superset db upgrade &&
      superset init &&
      superset run -p 8088 --with-threads --reload --debugger --host 0.0.0.0
      "

  spark-master:
    image: apache/spark:3.5.1
    container_name: mkt_spark_master
    # Phải có lệnh này thì container mới không thoát (exit)
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8081:8080"
      - "7077:7077"
    volumes:
      - ./:/opt/spark/work-dir
    networks:
      - marketing-net

  spark-worker:
    image: apache/spark:3.5.1
    container_name: mkt_spark_worker
    # Lệnh khởi động worker trỏ về master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    networks:
      - marketing-net

  # 5. Airflow Metadata Database
  postgres:
    image: postgres:13
    container_name: mkt_postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    networks:
      - marketing-net

  airflow-init:
    image: apache/airflow:2.7.1
    container_name: mkt_airflow_init
    depends_on:
      - postgres
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    command: >
      bash -c "
      pip install confluent-kafka requests && 
      airflow db migrate &&
      airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password password123 || true
      "
    networks:
      - marketing-net
    volumes:
      - ./:/opt/spark/work-dir
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/.ivy2:/home/airflow/.ivy2

  # 6. Airflow Webserver
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: apache/airflow:2.7.1
    container_name: mkt_airflow_webserver
    depends_on:
      postgres:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=password123
      - _AIRFLOW_WWW_USER_EMAIL=admin@example.com
      - _AIRFLOW_WWW_USER_FIRSTNAME=Admin
      - _AIRFLOW_WWW_USER_LASTNAME=User
      - _AIRFLOW_WWW_USER_ROLE=Admin
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./:/opt/spark/work-dir
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/.ivy2:/home/airflow/.ivy2
    ports:
      - "8082:8080"
    command: >
        bash -c "
        pip install confluent-kafka requests && 
        airflow webserver
        "
    networks:
      - marketing-net

  # 7. Airflow Scheduler 
  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow  
    image: apache/airflow:2.7.1
    container_name: mkt_airflow_scheduler
    depends_on:
      postgres:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=password123
      - _AIRFLOW_WWW_USER_EMAIL=admin@example.com
      - _AIRFLOW_WWW_USER_FIRSTNAME=Admin
      - _AIRFLOW_WWW_USER_LASTNAME=User
      - _AIRFLOW_WWW_USER_ROLE=Admin
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    volumes:
      - ./:/opt/spark/work-dir
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/.ivy2:/home/airflow/.ivy2
    command: >
        bash -c "
        pip install confluent-kafka requests && 
        airflow scheduler
        "
    networks:
      - marketing-net

volumes:
  clickhouse_data:
  minio_data: